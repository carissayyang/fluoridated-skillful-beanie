    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: #d0d0d0;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #f4f4f4;
            padding: 10px;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .search-bar {
            padding: 6px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            color: #666;
            text-align: center;
            font-size: 12px;
        }

        .contact {
            display: flex;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            justify-content: space-between;
        }

        .contact:hover {
            background: #e0e0e0;
        }

        .contact img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .contact-info {
            display: flex;
            align-items: center;
        }

        .last-message-time {
            font-size: 12px;
            color: #777;
        }

        /* Chat Window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* Header */
        .messages-bar {
            background: #d3d3d3;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .contact-name {
            font-size: 16px;
            font-weight: bold;
        }

        /* Messages */
        .messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .date-time {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-bottom: 8px;
        }

        .message {
            max-width: 65%;
            padding: 10px;
            margin: 2px 0;
            border-radius: 12px;
        }

        .sent {
            align-self: flex-end;
            background: #007bff;
            color: white;
        }

        .received {
            align-self: flex-start;
            background: #e0e0e0;
        }

        .message + .message.same-sender {
            margin-top: 1px;
        }

        /* Input Box */
        .message-input {
            display: flex;
            border-top: 1px solid #ddd;
            padding: 8px;
            background: #f4f4f4;
        }

        .message-input input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .message-input button {
            margin-left: 8px;
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .message-input button:hover {
            background: #0056b3;
        }

    </style>

        function loadMessages(name) {
            const chatMessages = document.getElementById("chatMessages");
            const contactName = document.getElementById("contactName");
            contactName.textContent = name;

            chatMessages.innerHTML = `<div class="date-time">${conversations[name].time}</div>`;

            conversations[name].messages.forEach(msg => {
                const messageElement = document.createElement("div");
                messageElement.classList.add("message", msg.sender === "You" ? "sent" : "received");
                messageElement.innerText = msg.text;
                chatMessages.appendChild(messageElement);
            });

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function enableMessaging() {
            const inputField = document.querySelector(".message-input input");
            const sendButton = document.querySelector(".message-input button");

            inputField.removeAttribute("disabled");
            sendButton.removeAttribute("disabled");

            sendButton.addEventListener("click", () => {
                const messageText = inputField.value.trim();
                if (messageText !== "") {
                    const chatMessages = document.getElementById("chatMessages");

                    // Create message bubble
                    const failedMessage = document.createElement("div");
                    failedMessage.classList.add("message", "sent");
                    failedMessage.style.background = "#ffcccc"; // Light red background
                    failedMessage.style.color = "#b30000"; // Dark red text
                    failedMessage.innerText = messageText;

                    // Create "Could not send" error text
                    const errorText = document.createElement("div");
                    errorText.style.fontSize = "12px";
                    errorText.style.color = "#b30000"; // Dark red text
                    errorText.style.marginTop = "2px";
                    errorText.innerText = "Could not send";

                    // Wrap message and error text together
                    const messageWrapper = document.createElement("div");
                    messageWrapper.style.display = "flex";
                    messageWrapper.style.flexDirection = "column";
                    messageWrapper.style.alignItems = "flex-end";
                    messageWrapper.appendChild(failedMessage);
                    messageWrapper.appendChild(errorText);

                    chatMessages.appendChild(messageWrapper);
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    inputField.value = ""; // Clear input field
                }
            });
        }

        window.onload = () => {
            loadMessages("Dad");
            enableMessaging();
        };
    </script>
