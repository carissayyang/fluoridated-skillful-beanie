<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Verification</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #adadb8;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: #e9e9f0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 5px;
            outline: none;
            display: block;
            width: 200px;
            margin: 10px auto;
        }
        input:focus {
            border-color: #888;
        }
        .error {
            border-color: red;
            background-color: #ffe6e6;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #aeaeb7;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            width: 100px;
        }
        button:hover {
            background-color: #95959d;
        }
        .message {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="container">
    <h2 id="title">Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p class="message hidden" id="errorMessage">Incorrect password</p>
    <p class="hidden" id="hint">Hint: Henry's favorite food</p>
    <p class="hidden" id="attempts">4 attempts left</p>
</div>

<script>
    let attemptsLeft = 5;
    let firstAttempt = true;

    function checkPassword() {
        let inputField = document.getElementById("passwordInput");
        let errorMessage = document.getElementById("errorMessage");
        let hint = document.getElementById("hint");
        let attemptsText = document.getElementById("attempts");
        let title = document.getElementById("title");
        let container = document.getElementById("container");

        inputField.value = ""; // Clear input field
        inputField.classList.add("error"); // Highlight red
        errorMessage.classList.remove("hidden"); // Show error message

        if (firstAttempt) {
            hint.classList.remove("hidden"); // Show hint after first incorrect attempt
            attemptsText.classList.remove("hidden"); // Show attempts left
            firstAttempt = false;
        }

        attemptsLeft--;

        if (attemptsLeft > 0) {
            attemptsText.textContent = attemptsLeft + " attempt(s) left";
        } else {
            // Lock out the user
            inputField.style.display = "none";
            document.querySelector("button").style.display = "none";
            errorMessage.textContent = "Too many verification attempts";
            hint.textContent = "You have entered incorrect security information too many times. Try again later.";
            attemptsText.textContent = "";
            title.style.display = "none";
        }
    }
</script>

</body>
</html>
